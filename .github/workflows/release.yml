name: release-binaries

# When a v* tag is pushed, build standalone single-file binaries for each
# OS/architecture with PyInstaller and attach them to the GitHub Release.
# The artifacts are "download and run" with no Python required (the native z3 lib is bundled).
#
#   git tag v1.1.0 && git push origin v1.1.0
#
# For manual verification, it can also be triggered via workflow_dispatch from the Actions tab
# (in that case the attach-to-Release step is skipped and the result is kept as an artifact).

on:
  push:
    tags:
      - "v*"
  # Manual run. Once on main, it can be triggered via "Run workflow" in the Actions tab,
  # allowing a trial build + smoke test on any branch
  # (the Release-attach step is skipped by the tag guard, leaving only artifacts).
  workflow_dispatch:

permissions:
  contents: write   # Required to attach assets to the Release

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            target: macos-arm64
            asset: fslc-macos-arm64
          - os: ubuntu-latest
            target: linux-x64
            asset: fslc-linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            asset: fslc-linux-arm64
          - os: windows-latest
            target: windows-x64
            asset: fslc-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # z3-solver / lark / the project itself are all wheels or pure Python.
          # Use 3.12, for which a wide range of wheels is available.
          python-version: "3.12"

      - name: Install build dependencies
        # z3-solver is wheel-only (--only-binary). If the latest version lacks a wheel
        # for the given OS/arch (e.g. 4.16.0.0 has no macOS arm64 wheel), pip automatically
        # falls back to the most recent version that has a wheel. Without this, it falls back
        # to a source build of the sdist and fails with "Unable to build Z3".
        run: |
          python -m pip install --upgrade pip
          python -m pip install --only-binary=z3-solver . pyinstaller

      - name: Build standalone binary
        # --collect-all z3   : bundle z3's native libz3 (.so/.dylib/.dll)
        # --copy-metadata fslc: preserve version resolution via importlib.metadata
        run: >
          pyinstaller --onefile --name fslc
          --collect-all z3
          --copy-metadata fslc
          --distpath dist
          packaging/fslc_entry.py

      # Use a fixed, known spec that is verified and has no counterexample.
      # Picking an arbitrary .fsl via find|head can grab a demo spec that contains a
      # counterexample, causing verify to exit non-zero and making the run flaky
      # depending on the runner's file ordering.
      - name: Smoke test (binary must self-contain Python + z3)
        if: runner.os != 'Windows'
        run: |
          ./dist/fslc --version
          ./dist/fslc verify examples/pm/cancel_flow.fsl > /dev/null
          echo "ok"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./dist/fslc.exe --version
          ./dist/fslc.exe verify examples/pm/cancel_flow.fsl > $null
          echo "ok"

      - name: Rename + checksum (unix)
        if: runner.os != 'Windows'
        run: |
          mv dist/fslc "dist/${{ matrix.asset }}"
          ( cd dist && shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256" )

      - name: Rename + checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item dist/fslc.exe "dist/${{ matrix.asset }}"
          $hash = (Get-FileHash "dist/${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding ascii "dist/${{ matrix.asset }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256

  vsix:
    name: build vscode extension (.vsix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build .vsix
        # vscode:prepublish compiles TypeScript before packaging.
        working-directory: editors/vscode
        run: |
          npm install
          npx --yes @vscode/vsce package --out fsl-vscode.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsl-vscode-vsix
          path: editors/vscode/fsl-vscode.vsix

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/fsl-vscode.vsix
