name: release-binaries

# When a v* tag is pushed, build the native Rust fslc binary for each supported
# OS/architecture and attach it to the GitHub Release.
#
#   git tag v1.1.0 && git push origin v1.1.0
#
# For manual verification, it can also be triggered via workflow_dispatch from the Actions tab
# (in that case the attach-to-Release step is skipped and the result is kept as an artifact).

on:
  push:
    tags:
      - "v*"
  # Manual run. Once on main, it can be triggered via "Run workflow" in the Actions tab,
  # allowing a trial build + smoke test on any branch
  # (the Release-attach step is skipped by the tag guard, leaving only artifacts).
  workflow_dispatch:

permissions:
  contents: write   # Required to attach assets to the Release

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            target: macos-arm64
            asset: fslc-macos-arm64
            lsp_asset: fslc-lsp-macos-arm64
          - os: ubuntu-latest
            target: linux-x64
            asset: fslc-linux-x64
            lsp_asset: fslc-lsp-linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            asset: fslc-linux-arm64
            lsp_asset: fslc-lsp-linux-arm64
          - os: windows-latest
            target: windows-x64
            asset: fslc-windows-x64.exe
            lsp_asset: fslc-lsp-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build native Rust binary
        working-directory: rust
        env:
          Z3_SYS_Z3_VERSION: "4.16.0"
        run: cargo build --release --locked -p fslc-rust -p fsl-lsp

      # Use a fixed, known spec that is verified and has no counterexample.
      # Picking an arbitrary .fsl via find|head can grab a demo spec that contains a
      # counterexample, causing verify to exit non-zero and making the run flaky
      # depending on the runner's file ordering.
      - name: Smoke test (native binary must self-contain z3)
        if: runner.os != 'Windows'
        run: |
          ./rust/target/release/fslc --version
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            test "$(./rust/target/release/fslc --version)" = "fslc ${GITHUB_REF_NAME#v}"
          fi
          ./rust/target/release/fslc verify examples/pm/cancel_flow.fsl > /dev/null
          echo "ok"

      - name: Smoke test LSP startup handshake (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          frame() { printf 'Content-Length: %s\r\n\r\n%s' "${#1}" "$1"; }
          response=$({
            frame '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":null,"rootUri":null,"capabilities":{}}}'
            frame '{"jsonrpc":"2.0","method":"initialized","params":{}}'
            frame '{"jsonrpc":"2.0","id":2,"method":"shutdown","params":null}'
            frame '{"jsonrpc":"2.0","method":"exit","params":null}'
          } | ./rust/target/release/fslc-lsp)
          grep -q '"capabilities"' <<<"$response"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./rust/target/release/fslc.exe --version
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $expected = "fslc $($env:GITHUB_REF_NAME.Substring(1))"
            if ((./rust/target/release/fslc.exe --version) -ne $expected) { throw "binary version does not match tag" }
          }
          ./rust/target/release/fslc.exe verify examples/pm/cancel_flow.fsl > $null
          echo "ok"

      - name: Smoke test LSP startup handshake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Frame([string] $body) {
            "Content-Length: $([Text.Encoding]::UTF8.GetByteCount($body))`r`n`r`n$body"
          }
          $messages = (Frame '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":null,"rootUri":null,"capabilities":{}}}') +
            (Frame '{"jsonrpc":"2.0","method":"initialized","params":{}}') +
            (Frame '{"jsonrpc":"2.0","id":2,"method":"shutdown","params":null}') +
            (Frame '{"jsonrpc":"2.0","method":"exit","params":null}')
          $response = $messages | ./rust/target/release/fslc-lsp.exe
          $responseText = $response -join "`n"
          if ($responseText -notmatch '"capabilities"') { throw "fslc-lsp did not complete the initialize handshake" }

      - name: Rename + checksum (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          mv rust/target/release/fslc "dist/${{ matrix.asset }}"
          mv rust/target/release/fslc-lsp "dist/${{ matrix.lsp_asset }}"
          ( cd dist && shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256" )
          ( cd dist && shasum -a 256 "${{ matrix.lsp_asset }}" > "${{ matrix.lsp_asset }}.sha256" )

      - name: Rename + checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Move-Item rust/target/release/fslc.exe "dist/${{ matrix.asset }}"
          Move-Item rust/target/release/fslc-lsp.exe "dist/${{ matrix.lsp_asset }}"
          $hash = (Get-FileHash "dist/${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding ascii "dist/${{ matrix.asset }}.sha256"
          $lspHash = (Get-FileHash "dist/${{ matrix.lsp_asset }}" -Algorithm SHA256).Hash.ToLower()
          "$lspHash  ${{ matrix.lsp_asset }}" | Out-File -Encoding ascii "dist/${{ matrix.lsp_asset }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
            dist/${{ matrix.lsp_asset }}
            dist/${{ matrix.lsp_asset }}.sha256

      - name: Attach to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
            dist/${{ matrix.lsp_asset }}
            dist/${{ matrix.lsp_asset }}.sha256

  vsix:
    name: build vscode extension (.vsix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build .vsix
        # vscode:prepublish compiles TypeScript before packaging.
        working-directory: editors/vscode
        run: |
          npm install
          npx --yes @vscode/vsce package --out fsl-vscode.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsl-vscode-vsix
          path: editors/vscode/fsl-vscode.vsix

      - name: Attach to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/fsl-vscode.vsix

  kernel-contract:
    name: package public Kernel contracts v1 and v2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package schemas, vectors, and integration guides
        run: |
          mkdir -p dist/fsl-kernel-contract-v1/schemas
          mkdir -p dist/fsl-kernel-contract-v1/fixtures
          cp schemas/fslc/kernel/kernel.v1.schema.json dist/fsl-kernel-contract-v1/schemas/
          cp schemas/fslc/kernel/conformance.v1.schema.json dist/fsl-kernel-contract-v1/schemas/
          cp schemas/fslc/kernel/testgen-trace.v1.schema.json dist/fsl-kernel-contract-v1/schemas/
          cp schemas/fslc/kernel/replay-trace.v1.schema.json dist/fsl-kernel-contract-v1/schemas/
          cp schemas/fslc/kernel/conformance-coverage.v1.schema.json dist/fsl-kernel-contract-v1/schemas/
          cp schemas/fslc/domain/scaffold-metadata.v1.schema.json dist/fsl-kernel-contract-v1/schemas/
          cp rust/fslc/tests/fixtures/kernel_contract.fsl dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/kernel_contract.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/conformance_failures.fsl dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/conformance_failures.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/conformance_coverage.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/conformance_coverage.v1.md dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.fsl dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.valid.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.state-mismatch.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.bad-tick.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/replay_observation.fsl dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/replay_observation.valid.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp rust/fslc/tests/fixtures/replay_observation.transient-observed.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp examples/nfr/bounded_response.fsl dist/fsl-kernel-contract-v1/fixtures/
          cp examples/nfr/bounded_response.within.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp examples/nfr/bounded_response.overdue.v1.json dist/fsl-kernel-contract-v1/fixtures/
          cp docs/DESIGN-replay-trace.md dist/fsl-kernel-contract-v1/
          cp docs/DESIGN-kernel-contract.md dist/fsl-kernel-contract-v1/README.md
          tar -czf dist/fsl-kernel-contract-v1.tar.gz -C dist fsl-kernel-contract-v1
          ( cd dist && shasum -a 256 fsl-kernel-contract-v1.tar.gz > fsl-kernel-contract-v1.tar.gz.sha256 )

          mkdir -p dist/fsl-kernel-contract-v2/schemas
          mkdir -p dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/domain_characterization
          mkdir -p dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures
          mkdir -p dist/fsl-kernel-contract-v2/docs
          cp schemas/fslc/kernel/kernel.v2.schema.json dist/fsl-kernel-contract-v2/schemas/
          cp schemas/fslc/kernel/conformance.v2.schema.json dist/fsl-kernel-contract-v2/schemas/
          cp schemas/fslc/kernel/conformance-coverage.v2.schema.json dist/fsl-kernel-contract-v2/schemas/
          cp schemas/fslc/kernel/replay-trace.v1.schema.json dist/fsl-kernel-contract-v2/schemas/
          cp rust/fslc/tests/fixtures/domain_characterization/expressions_valid.fsl dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/domain_characterization/
          cp rust/fslc/tests/fixtures/kernel_origin.v2.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/conformance_failures.fsl dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/conformance_failures.v2.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/conformance_coverage.v2.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.fsl dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.valid.v1.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.state-mismatch.v1.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/replay_trace.bad-tick.v1.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/replay_observation.fsl dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/replay_observation.valid.v1.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp rust/fslc/tests/fixtures/replay_observation.transient-observed.v1.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp examples/nfr/bounded_response.fsl dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp examples/nfr/bounded_response.within.v1.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp examples/nfr/bounded_response.overdue.v1.json dist/fsl-kernel-contract-v2/rust/fslc/tests/fixtures/
          cp docs/DESIGN-replay-trace.md dist/fsl-kernel-contract-v2/docs/
          cp docs/DESIGN-kernel-origin-v2.md dist/fsl-kernel-contract-v2/README.md
          cp docs/DESIGN-kernel-contract.md dist/fsl-kernel-contract-v2/docs/
          tar -czf dist/fsl-kernel-contract-v2.tar.gz -C dist fsl-kernel-contract-v2
          ( cd dist && shasum -a 256 fsl-kernel-contract-v2.tar.gz > fsl-kernel-contract-v2.tar.gz.sha256 )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsl-kernel-contract-v1
          path: |
            dist/fsl-kernel-contract-v1.tar.gz
            dist/fsl-kernel-contract-v1.tar.gz.sha256

      - name: Upload v2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsl-kernel-contract-v2
          path: |
            dist/fsl-kernel-contract-v2.tar.gz
            dist/fsl-kernel-contract-v2.tar.gz.sha256

      - name: Attach to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fsl-kernel-contract-v1.tar.gz
            dist/fsl-kernel-contract-v1.tar.gz.sha256
            dist/fsl-kernel-contract-v2.tar.gz
            dist/fsl-kernel-contract-v2.tar.gz.sha256
