name: ci

# Python is a frozen reference implementation. CI validates the primary Rust
# workspace, its compatibility contract against that reference, the solver
# boundary, and browser/WASM distribution surfaces.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-cli-contract:
    name: Rust CLI contract against frozen Python reference
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      Z3_SYS_Z3_VERSION: "4.16.0"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install frozen Python reference test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate Rust CLI compatibility and Rust-only surface
        run: python -m pytest tests/test_rust_cli_contract.py tests/test_claude_environment.py -q

  rust-workspace-wasm:
    name: rust workspace and WASM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      Z3_SYS_Z3_VERSION: "4.16.0"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Check Rust workspace and dependency boundary
        working-directory: rust
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --workspace --locked
          if cargo tree -p fsl-runtime --edges normal | grep -E 'fsl-solver|z3'; then
            echo "::error::fsl-runtime must remain solver-independent"
            exit 1
          fi
          if cargo tree -p fsl-wasm --edges normal | grep 'fsl-solver-z3 v'; then
            echo "::error::fsl-wasm must not depend on the native Z3 backend"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            rust/spikes/z3js-worker/package-lock.json
            rust/fsl-wasm/package-lock.json

      - name: Probe official z3-solver Worker backend
        working-directory: rust/spikes/z3js-worker
        run: |
          npm ci
          npm run probe
          npm run probe:browser

      - name: Build and verify production Rust WASM Worker
        working-directory: rust/fsl-wasm
        run: |
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          npm ci
          npm run test:browser

  rust-native-z3:
    name: native Z3 4.16 (${{ matrix.os }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15-intel, windows-latest]
    env:
      Z3_SYS_Z3_VERSION: "4.16.0"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Test pinned native solver and BMC crates
        working-directory: rust
        run: cargo test --locked -p fsl-solver-z3 -p fsl-verifier -p fslc-rust
