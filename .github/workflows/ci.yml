name: ci

# Python is a frozen reference implementation and optional LSP surface. The
# required product gate executes only the authoritative Rust and WASM surfaces.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-workspace-wasm:
    name: rust workspace and WASM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      Z3_SYS_Z3_VERSION: "4.16.0"
      READ_ONLY_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            rust/spikes/z3js-worker/package-lock.json
            rust/fsl-wasm/package-lock.json

      - name: Install pinned wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Check native integration suite
        run: ./tools/check-native-integration.sh

  rust-native-z3:
    name: native Z3 4.16 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    env:
      Z3_SYS_Z3_VERSION: "4.16.0"
      READ_ONLY_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Test pinned native solver and BMC crates
        working-directory: rust
        run: cargo test --locked -p fsl-solver-z3 -p fsl-verifier -p fslc-rust
