name: ci

# PRs run the full suite split into 3 balanced shards (.github/ci-shards/) plus a
# smaller cross-version smoke suite for fast feedback. main, scheduled, and manual
# runs keep the full Python 3.9-3.12 matrix, unsharded.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-shard-coverage:
    name: shard coverage check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Verify shard file lists exactly partition tests/test_*.py
        run: |
          cat .github/ci-shards/shard-*.txt | sort > /tmp/covered.txt
          ls tests/test_*.py | sort > /tmp/actual.txt
          if ! diff -u /tmp/actual.txt /tmp/covered.txt; then
            echo "::error::.github/ci-shards/shard-*.txt no longer exactly partitions tests/test_*.py (missing, extra, or duplicated file). Add new test files to exactly one shard-N.txt."
            exit 1
          fi

  pr-full:
    name: full pytest (py3.12, shard ${{ matrix.shard }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test shard
        run: pytest -q $(cat .github/ci-shards/shard-${{ matrix.shard }}.txt)

  pr-compat-smoke:
    name: compat smoke (py${{ matrix.python-version }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run compatibility smoke tests
        run: >
          pytest -q
          tests/test_version.py
          tests/test_v1.py
          tests/test_temporal.py
          tests/test_logic_temporal_sugar.py

  full-matrix:
    name: full pytest (py${{ matrix.python-version }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full test suite
        run: pytest -q
