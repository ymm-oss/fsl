name: ci

env:
  MACOSX_DEPLOYMENT_TARGET: "14.0"

# Python is a frozen reference implementation and optional LSP surface. The
# required product gate executes only the authoritative Rust and WASM surfaces.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-workspace:
    name: rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Check Rust workspace
        run: ./tools/check-native-integration.sh rust

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            rust/spikes/z3js-worker/package-lock.json
            rust/fsl-wasm/package-lock.json

      - name: Cache pinned wasm-bindgen CLI
        id: wasm-bindgen-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            ~/.cargo/bin/wasm2es6js
          key: ${{ runner.os }}-wasm-bindgen-cli-0.2.126

      - name: Install pinned wasm-bindgen CLI
        if: steps.wasm-bindgen-cache.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Check WASM integration
        run: ./tools/check-native-integration.sh wasm

  rust-native-z3:
    name: native Z3 4.16 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Test pinned native solver and BMC crates
        working-directory: rust
        run: cargo test --locked -p fsl-solver-z3 -p fsl-verifier -p fslc-rust
