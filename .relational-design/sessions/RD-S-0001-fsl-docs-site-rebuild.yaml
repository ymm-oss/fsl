critiques:
  - id: RD-CR-001
    kind: critique
    target: RD-AR-002
    severity: high
    claim: >
      No return path on long single-page reference trees below the 1180px breakpoint, where
      the sidebar loses its sticky rail.
    violated_relation: RD-R-015
    affected_decision: RD-DD-002
    recommendation: "Add a back-to-top exception for the two long single-page reference templates."
    resolution: "Fixed via the RD-DD-002 back-to-top exception (RD-REV-001)."
    status: active

  - id: RD-CR-002
    kind: critique
    target: RD-AR-002
    severity: high
    claim: >
      Category group labels were plain unlabeled <p> tags with 4 anonymous <nav> landmarks,
      invisible to screen-reader heading/landmark rotors.
    violated_relation: RD-R-001
    affected_decision: RD-DD-001
    recommendation: "Use real <h2 id> headings with aria-labelledby wiring on every category nav."
    resolution: "Fixed: 12 occurrences across the 3 wireframe panels (RD-REV-002)."
    status: active

  - id: RD-CR-003
    kind: critique
    target: RD-AR-002
    severity: high
    claim: >
      The provenance badge's bordered/tinted "header-band" box, combined with the pill badge,
      reused this site's live verify-verdict visual grammar (colored pill + tinted callout box)
      closely enough that a reader could misread it as page status rather than provenance.
    violated_relation: RD-R-009
    affected_decision: RD-DD-005
    recommendation: "Drop the header-band; keep a plain badge only."
    resolution: "Fixed (RD-REV-003)."
    status: active

  - id: RD-CR-004
    kind: critique
    target: RD-AR-002
    severity: medium
    claim: >
      Hand-computed sidebar height (4 category labels + up to 14 chapter rows) likely exceeds
      common laptop viewport heights (~768-900px), triggering the sidebar's own pre-existing
      overflow:auto behavior.
    violated_relation: RD-R-010
    affected_decision: RD-DD-001
    recommendation: "Consider an accordion or other density control if sidebar height becomes a real problem."
    resolution: >
      NOT structurally changed. Accepted explicitly in the design doc as a known, pre-existing
      pattern trade-off rather than reversing RD-DD-001's rejection of RD-H-002 (accordion).
      Remains a live, accepted risk.
    status: active

  - id: RD-CR-005
    kind: critique
    target: RD-AR-001
    severity: medium
    claim: >
      RD-DD-006's "one-line edit" claim for re-categorizing a chapter didn't account for
      intra-category render ordering (no per-category order field exists).
    violated_relation: RD-R-017
    affected_decision: RD-DD-006
    recommendation: "Correct the doc text to scope the claim accurately, or add a per-category order field."
    resolution: "Fixed by correcting doc text scope, not by changing the data model (RD-REV-004)."
    status: active

  - id: RD-CR-006
    kind: critique
    target: RD-AR-002
    severity: medium
    claim: >
      Wireframe's own topbar was missing position:sticky (undermining RD-DD-002's stated
      rationale that the topbar is already sticky), and its review-only view-switcher had a
      colliding z-index/stickiness with the sidebar.
    violated_relation: RD-R-015
    affected_decision: RD-DD-002
    recommendation: "Make the wireframe topbar sticky to match the real site; de-sticky the review-only view-switcher."
    resolution: "Both fixed in the wireframe CSS (RD-REV-005)."
    status: active

  - id: RD-CR-007
    kind: critique
    target: RD-AR-001
    severity: medium
    claim: >
      Monospace H1/H2 on generated pages collided with this site's sitewide "monospace =
      literal code" convention.
    violated_relation: RD-R-009
    affected_decision: RD-DD-005
    recommendation: "Replace monospace H1/H2 with a small mono-set kicker label above an ordinary sans H1."
    resolution: "Fixed (RD-REV-006), same fix as RD-CR-003's badge change, described together under RD-DD-005."
    status: active

  - id: RD-CR-008
    kind: critique
    target: RD-DD-005
    severity: low
    claim: >
      Checked, not padded: --ref/--ref-soft contrast ratios were verified to meet/exceed the
      existing --ok/--warn/--danger soft-badge pairs in both light and dark mode.
    violated_relation: null
    affected_decision: RD-DD-005
    recommendation: "None — no issue found."
    resolution: "No change needed."
    status: active

  - id: RD-CR-009
    kind: critique
    target: RD-DD-006
    severity: low
    claim: >
      Checked, not padded: the CHAPTERS+CATEGORIES split was confirmed to genuinely satisfy the
      "single source of truth" hard constraint (RD-C-005) — only intra-category ordering had a
      gap, per RD-CR-005.
    violated_relation: RD-C-005
    affected_decision: RD-DD-006
    recommendation: "None — no issue found beyond RD-CR-005's scoped gap."
    resolution: "No change needed."
    status: active

