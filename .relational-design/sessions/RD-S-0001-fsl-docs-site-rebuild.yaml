    claim: >
      The --ref/--ref-soft token pair and its scoping rule ("one new semantic token, applied
      only to N named places, never sitewide") is a reusable pattern worth generalizing into
      design-token governance notes, given the site already has 4 reserved semantic colors
      with a documented meaning-per-color convention this new pair had to fit alongside.
    source_artifacts: [RD-AR-001]
    depends_on: [RD-DD-005]
    status: proposed

  - id: RD-BF-002
    kind: backflow
    claim: >
      "Native <details>/<summary> over custom JS widget, because AI-agent HTML fetchers must
      see full content" is a reusable interaction-pattern rule specific to this project's dual
      human/agent-consumed documentation model — worth recording as a component/pattern rule
      for any future disclosure UI on this site.
    source_artifacts: [RD-AR-001, RD-AR-002]
    depends_on: [RD-DD-003, RD-H-007]
    status: proposed

  - id: RD-BF-003
    kind: backflow
    claim: >
      The categorized-sidebar accessibility fix (<h2> + aria-labelledby per group) is a
