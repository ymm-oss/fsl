constraints:
  - id: RD-C-001
    kind: constraint
    type: implementation
    claim: "All 24 existing chapter URLs (12 chapters x ja/en) must keep resolving unchanged."
    confidence: high
    status: active

  - id: RD-C-002
    kind: constraint
    type: business
    claim: "IA is fixed to 4 Diátaxis categories: はじめる / ガイド / リファレンス / 実例と背景."
    confidence: high
    status: active

  - id: RD-C-003
    kind: constraint
    type: implementation
    claim: >
      2 new generated reference pages (language from docs/LANGUAGE.md, cli from cli.py's
      argparse tree) need a template suited to long/structured non-narrative content.
    confidence: high
    status: active

  - id: RD-C-004
    kind: constraint
    type: content
    claim: "ja/en twins are mandatory for every page."
    confidence: high
    status: active

  - id: RD-C-005
    kind: constraint
    type: implementation
    claim: >
      site.js's CHAPTERS array is the single source of truth for topbar + sidebar + footer
      navigation — must not be duplicated by a second nav-mapping source.
    confidence: high
    status: active

relations:
  - id: RD-R-001
    kind: relation
    relation_type: user_to_action
    claim: "Human readers (RD-ACT-001) browse the four Diátaxis categories linearly via nav."
    design_implication: "Sidebar/nav must support linear category browsing without added click-cost."
    risk_if_ignored: "First-time readers lose an intuitive path through the manual."
    depends_on: [RD-O-002, RD-C-002]
    confidence: medium
    status: active

  - id: RD-R-002
    kind: relation
    relation_type: user_to_action
    claim: >
      AI agents (RD-ACT-002) skip nav entirely, arriving via direct URL or search-index fetch
      straight into reference pages.
    design_implication: >
      Reference-page templates must be fully self-contained and correct without relying on
      nav-mediated arrival (e.g. native HTML disclosure, not JS-only content).
    risk_if_ignored: "Agent consumers get incomplete or broken content if templates assume nav context."
    depends_on: [RD-O-002]
    confidence: medium
    status: active

  - id: RD-R-003
    kind: relation
    relation_type: implementation_constraint_to_design_choice
    claim: >
      Current index.html's two browsing modes (ordered list + by-goal grid) must both survive
      the reorg into 4 Diátaxis categories.
    design_implication: >
      New IA/nav must preserve both an ordered/sequential view and a goal-oriented view of
      chapters.
    risk_if_ignored: "Losing either mode regresses an existing discovery path for RD-ACT-001."
    depends_on: [RD-C-002]
    confidence: medium
    status: active

  - id: RD-R-006
    kind: relation
    relation_type: information_to_confidence
    claim: >
      Four distinct "confidence shapes" exist across templates: narrative/interactive,
      dense-reference, mid-length layer-explainer, and now generated/machine-derived.
    design_implication: "Each shape must stay visually distinguishable across the reorg."
    risk_if_ignored: "Readers conflate hand-authored narrative content with generated reference content."
    depends_on: [RD-C-003]
    confidence: medium
    status: active

  - id: RD-R-007
    kind: relation
    relation_type: information_to_confidence
    claim: >
      The generated/machine-derived shape is new (introduced by RD-C-003) and has no
      precedent template on the current site.
    design_implication: "A new template must be designed for it rather than reusing an existing shape."
    risk_if_ignored: "Forcing generated content into an existing shape misrepresents its provenance."
    depends_on: [RD-R-006, RD-C-003]
    confidence: medium
    status: active

  - id: RD-R-008
    kind: relation
    relation_type: information_to_confidence
    claim: >
      The mid-length layer-explainer shape (business/requirements/design layer chapters) is
      distinct from both narrative and dense-reference shapes and must not be collapsed into
      either during the reorg.
    design_implication: "Preserve its current template distinctly through the reorg."
    risk_if_ignored: "Layer-explainer chapters lose their current presentation."
    depends_on: [RD-R-006]
    confidence: medium
    status: active

  - id: RD-R-009
    kind: relation
    relation_type: information_to_confidence
    claim: >
      Staleness in the generated shape (generated content silently drifting from its source)
      is a silent correctness bug, not a content-authoring issue.
    design_implication: "The generated-page template needs a provenance signal distinct from ordinary content-freshness concerns."
    risk_if_ignored: "Readers and agents trust stale generated reference pages as if hand-verified."
    depends_on: [RD-R-006, RD-R-007]
    confidence: high
    status: active

  - id: RD-R-010
    kind: relation
    relation_type: visual_hierarchy_to_behavior
    claim: >
      A 2-level category hierarchy trades one-glance scanning of all chapters for either
      added click-cost (if collapsed) or vertical growth (if expanded).
    design_implication: "Sidebar rendering choice (expanded vs collapsed) directly trades scan speed against vertical space."
    risk_if_ignored: "Wrong tradeoff choice degrades either fast lookup or overview scanning."
    depends_on: [RD-C-002]
    confidence: medium
    status: active

  - id: RD-R-011
    kind: relation
    relation_type: visual_hierarchy_to_behavior
    claim: "The RD-R-010 tradeoff must resolve in favor of not penalizing fast reference lookup, per RD-ACT-002's needs."
    design_implication: "Prefer an always-visible structure over one requiring extra interaction to reach reference pages."
    risk_if_ignored: "AI-agent and expert-human reference lookups become slower than the current flat structure."
    depends_on: [RD-R-010, RD-R-002]
    confidence: medium
    status: active

  - id: RD-R-012
    kind: relation
    relation_type: visual_hierarchy_to_behavior
    claim: >
      Fast reference lookup (RD-R-011) and first-glance category overview (RD-R-010) are in
      tension and both must be satisfied by the same sidebar.
    design_implication: "A single navigation component must serve both goals simultaneously."
    risk_if_ignored: "Optimizing for one goal alone regresses the other actor's primary use case."
    depends_on: [RD-R-010, RD-R-011]
    confidence: medium
    status: active

  - id: RD-R-013
    kind: relation
    relation_type: interaction_to_reversibility
    claim: "The ja/en toggle must stay a safe in-place swap (same page, same scroll position, no navigation loss)."
    design_implication: "Any reorg must not change how the language toggle behaves relative to current page state."
    risk_if_ignored: "Readers lose place or context when switching languages."
    depends_on: [RD-C-004]
    confidence: high
    status: active

  - id: RD-R-014
    kind: relation
    relation_type: interaction_to_reversibility
    claim: >
      Deep-linked readers (arriving directly at a chapter/reference page, bypassing nav) need
      a visible breadcrumb to orient themselves.
    design_implication: "Every page needs a breadcrumb showing its category ancestry, not just chapter title."
    risk_if_ignored: "Deep-linked readers cannot tell where they are in the IA."
    depends_on: [RD-R-002]
    confidence: medium
    status: active

  - id: RD-R-015
    kind: relation
    relation_type: interaction_to_reversibility
    claim: >
      Deep-linked readers additionally need a genuine return path back to a broader view;
      today's hub-and-spoke navigation is one-way (spoke pages don't route back to the hub).
    design_implication: "Breadcrumb or equivalent affordance must be a functioning return link, not just a label."
    risk_if_ignored: "Readers get stranded on spoke pages with no way back except browser-back."
    depends_on: [RD-R-014]
    confidence: medium
    status: active

  - id: RD-R-016
    kind: relation
    relation_type: implementation_constraint_to_design_choice
    claim: >
      Frozen URLs (RD-C-001) force an additive-only hub-and-spoke IA — existing chapter
      URLs/pages cannot be restructured, only added around.
    design_implication: "New category hub pages and reference pages must be added around the existing 24 URLs, not replace them."
    risk_if_ignored: "Reorg breaks RD-C-001's URL-stability constraint."
    depends_on: [RD-C-001]
    confidence: high
    status: active

  - id: RD-R-017
    kind: relation
    relation_type: implementation_constraint_to_design_choice
    claim: "site.js's CHAPTERS array must stay the single nav-mapping source (RD-C-005) even as category metadata is added."
    design_implication: "Any new category-hierarchy data must extend, not duplicate, CHAPTERS."
    risk_if_ignored: "Two nav-mapping sources drift out of sync over time."
    depends_on: [RD-C-005]
    confidence: high
    status: active

  - id: RD-R-018
    kind: relation
    relation_type: implementation_constraint_to_design_choice
    claim: "cli.py's nested subcommand tree needs a template that isn't a flat TOC — its structure is inherently 2+ levels deep."
    design_implication: "The reference-page template must support nested disclosure, not a flat list."
    risk_if_ignored: "A flat TOC would misrepresent or bury cli.py's actual subcommand nesting."
    depends_on: [RD-C-003]
    confidence: medium
    status: active

  - id: RD-R-019
    kind: relation
    relation_type: implementation_constraint_to_design_choice
    claim: >
      Generated pages are English-sourced (from docs/LANGUAGE.md and cli.py, both English),
      which raises an open question about how ja twins get produced for them — not resolved
      by this session.
    design_implication: "RD-C-004 (ja/en twins mandatory) has an unresolved production mechanism gap for generated pages specifically."
    risk_if_ignored: >
      Either ja twins for generated pages get skipped (breaking RD-C-004) or get
      hand-translated with no defined process (undermining RD-C-003's generation premise).
    depends_on: [RD-C-003, RD-C-004]
    confidence: medium
    status: questioned

  - id: RD-R-020
    kind: relation
    relation_type: implementation_constraint_to_design_choice
    claim: >
      RD-DD-006/D6 established the 4 category hub pages as the category-level navigation
      surface for the site, but neither RD-DD-006 nor DESIGN-docs-site.md's §6 "out of scope"
      list specified how (or whether) the site-root homepage (index.html) itself integrates or
      defers to those hub pages, or how the homepage's pre-existing "browse by goal" grid should
      track the now-19-entry CHAPTERS array as it grows.
    design_implication: >
      A homepage restructure that surfaces the hub pages and refreshes the goal-grid is a
      plausible, low-risk extension of D6 — but it is new ground D6 did not itself decide, and
      should be nav-parity-checked (do the hub pages and homepage agree on what belongs where)
      rather than assumed correct by extension.
    risk_if_ignored: >
      Homepage and hub-page navigation could silently diverge (e.g. a chapter present in a hub
      page's category list but omitted from the homepage's goal-grid, or vice versa), which is
      exactly the kind of nav-mapping drift RD-C-005/RD-R-017 were meant to prevent.
    depends_on: [RD-DD-006, RD-O-004]
    confidence: medium
    status: active

hypotheses:
  - id: RD-H-001
    kind: hypothesis
    name: always-expanded-2-level-sidebar
    claim: "Always-expanded 2-level categorized sidebar shown on every page."
    expected_effect: "Satisfies RD-R-003's scan-all-chapters-in-order behavior while adding category grouping."
    risk: "Vertical growth as categories/chapters increase (see RD-CR-004)."
    depends_on: [RD-R-003, RD-R-010, RD-R-011, RD-R-012]
    confidence: medium
    if_false_retract: [RD-DD-001]
    status: active

  - id: RD-H-002
    kind: hypothesis
    name: accordion-sidebar
    claim: "Collapsible/accordion categorized sidebar, collapsed by default."
    expected_effect: "Reduces vertical space consumed per category."
    risk: "Breaks RD-R-003's 'scan all chapters in order' behavior — chapters outside the open category are hidden."
    depends_on: [RD-R-010]
    confidence: low
    if_false_retract: []
    status: retracted

  - id: RD-H-003
    kind: hypothesis
    name: dual-mode-toggle-sidebar
    claim: "User-toggleable dual-mode sidebar (switch between expanded and accordion)."
    expected_effect: "Lets readers choose their preferred density."
    risk: "Needless complexity once everything is already visible by default under RD-H-001."
    depends_on: [RD-H-001, RD-H-002]
    confidence: low
    if_false_retract: []
    status: retracted

  - id: RD-H-004
    kind: hypothesis
    name: separate-sticky-back-button
    claim: "A separate sticky 'back to category' button, independent of breadcrumb."
    expected_effect: "Gives a persistent, always-visible return affordance."
    risk: "Stacks with the site's already-sticky topbar, adding visual clutter."
    depends_on: [RD-R-015]
    confidence: low
    if_false_retract: []
    status: retracted

  - id: RD-H-005
    kind: hypothesis
    name: sidebar-every-page-every-breakpoint
    claim: "Render the same categorized sidebar on every page at every breakpoint."
    expected_effect: "Consistent orientation affordance everywhere, avoiding the need for RD-H-004."
    risk: "At narrow breakpoints, sidebar may lose its sticky rail (see RD-CR-001)."
    depends_on: [RD-R-014]
    confidence: medium
    if_false_retract: [RD-DD-002]
    status: active

  - id: RD-H-006
    kind: hypothesis
    name: breadcrumb-category-segment-as-return-link
    claim: "Breadcrumb whose category segment doubles as the 'back to category' link."
    expected_effect: >
      A single affordance serves both orientation (RD-R-014) and return path (RD-R-015)
      without adding a new UI element (avoiding RD-H-004).
    risk: "Relies on readers recognizing the breadcrumb segment as clickable."
    depends_on: [RD-R-014, RD-R-015]
    confidence: medium
    if_false_retract: [RD-DD-002]
    status: active

  - id: RD-H-007
    kind: hypothesis
    name: native-details-summary-disclosure-tree
    claim: "Reference-page template built from native <details>/<summary> disclosure elements, not a JS widget."
    expected_effect: >
      Long/structured non-narrative content (RD-C-003) becomes navigable via native browser
      affordances; content stays in the DOM/a11y tree for non-JS/AI-agent HTML fetchers
      (RD-R-002).
    risk: "Flagged risk: could feel less polished/interactive than a custom JS tree widget."
    depends_on: [RD-C-003, RD-R-002, RD-R-018]
    confidence: medium
    if_false_retract: [RD-DD-003]
    status: active

  - id: RD-H-008
    kind: hypothesis
    name: long-scroll-deep-toc
    claim: "Single long-scroll reference page with a deep/expanded table of contents, no collapse elements."
    expected_effect: "Guarantees full content is visible to any fetcher (human scrolling or AI agent), satisfying RD-R-002."
    risk: "No progressive disclosure — dense for human scanning of long pages like cli.html."
    depends_on: [RD-C-003, RD-R-002]
    confidence: medium
    if_false_retract: []
    status: superseded

  - id: RD-H-009
    kind: hypothesis
    name: multi-file-split-reference
    claim: "Split each generated reference page across multiple files (e.g. one per top-level section)."
    expected_effect: "Smaller individual page sizes."
    risk: >
      Lowest-confidence option; adds N-times generation/ja-twin/provenance-badge complexity
      for one generated artifact.
    depends_on: [RD-C-003, RD-C-004]
    confidence: low
    if_false_retract: []
    status: retracted

  - id: RD-H-010
    kind: hypothesis
    name: neutral-provenance-badge
    claim: "A neutral, non-warning-colored badge signaling generated/machine-derived provenance."
    expected_effect: "Signals the generated-content shape (RD-R-009) without implying a status/warning."
    risk: "Could be visually confused with the site's existing verify-verdict pill/badge grammar (see RD-CR-003)."
    depends_on: [RD-R-009]
    confidence: medium
    if_false_retract: [RD-DD-004]
    status: active

  - id: RD-H-012
    kind: hypothesis
    name: badge-plus-ci-staleness-detection
    claim: >
      Provenance signal for generated pages should combine a visible badge with CI-enforced
      staleness detection to catch source/output drift automatically.
    expected_effect: "Visible badge informs readers; CI enforcement prevents silent staleness (RD-R-009's correctness-bug risk)."
    risk: "CI-enforcement half requires a generation pipeline that does not yet exist in this session's scope."
    depends_on: [RD-R-009, RD-H-010]
    confidence: medium
    if_false_retract: [RD-DD-004]
    status: active

  - id: RD-H-013
    kind: hypothesis
    name: extend-existing-token-system
    claim: "Extend the existing design-token system rather than introducing a parallel one."
    expected_effect: "New visual needs (provenance badge, tree accent) stay consistent with the rest of the site."
    risk: "Existing tokens may not cleanly express the new provenance concept."
    depends_on: [RD-R-009]
    confidence: high
    if_false_retract: [RD-DD-005]
    status: active

  - id: RD-H-014
    kind: hypothesis
    name: new-scoped-semantic-token-pair
    claim: >
      Add a new scoped semantic token pair for generated-reference-page chrome, narrower in
      scope than an initial broader proposal.
    expected_effect: "Gives the generated shape a distinct accent without a sitewide visual change."
    risk: "Any new semantic color must be checked against the site's existing reserved-color convention (see RD-CR-003, RD-CR-007)."
    depends_on: [RD-H-013, RD-R-009]
    confidence: medium
    if_false_retract: [RD-DD-005]
    status: active

  - id: RD-H-015
    kind: hypothesis
    name: chapters-gains-category-id
    claim: "CHAPTERS array gains a categoryId field per entry as the single source of truth for chapter-to-category membership."
    expected_effect: "Satisfies RD-R-017 without a second nav-mapping source."
    risk: "Provides no per-category ordering field (see RD-CR-005)."
    depends_on: [RD-C-005, RD-R-017]
    confidence: medium
    if_false_retract: [RD-DD-006]
    status: active

  - id: RD-H-016
    kind: hypothesis
    name: separate-categories-metadata-array
    claim: >
      Introduce a separate, small, non-growing CATEGORIES array (4 fixed entries: id/order/
      en/ja label+description) for category-level metadata, synthesized alongside RD-H-015
      rather than competing with it.
    expected_effect: "Hub pages can render category label/description/order without per-chapter duplication."
    risk: "Could become a second nav-mapping source if scope creeps beyond 4 fixed records."
    depends_on: [RD-H-015, RD-C-005]
    confidence: medium
    if_false_retract: [RD-DD-006]
    status: active

  - id: RD-H-017
    kind: hypothesis
    name: homepage-hub-primary-goal-grid-refresh-ops-relocation
    claim: >
      Restructure index.{ja,en}.html as: (a) surface the 4 category hub pages as primary entry
      points above/instead-of the flat 12-chapter list; (b) refresh the "目的別に読む"
      browse-by-goal card grid to include the 7 chapters added since the original grid was
      authored (quickstart, examples, language, cli, errors, glossary, design-notes); (c) remove
      the maintainer-facing "GitHub Pagesで公開する場合" section from the reader-facing homepage,
      relocating that content to docs/README.md rather than deleting it.
    expected_effect: >
      Homepage becomes consistent with D6's hub-page IA and the current 19-entry CHAPTERS array;
      reader-facing homepage no longer carries operator-facing content (consistent with the
      reader-vs-maintainer separation already established for RD-ACT-001 vs RD-ACT-003).
    risk: >
      (a)/(b) are additive/reversible and follow D6's already-decided hub-page concept, but the
      requester specifically flagged this as new ground beyond DESIGN-docs-site.md §6's explicit
      scope — no nav-parity check (hub-page category membership vs. homepage goal-grid contents)
      has been run yet. (c) is a relocation, not a deletion, but its target (docs/README.md) is
      itself one of the "once they exist" deferred cross-links named in §6, so its landing spot
      is not yet a settled artifact either.
    depends_on: [RD-R-020, RD-DD-006, RD-O-004]
    confidence: medium
    if_false_retract: []
    status: proposed
    note: >
      Recorded as PROPOSED, not folded into an accepted decision — see RD-U-006 open question
      and the trace-archivist's direct recommendation in its final report on whether to run a
      lightweight design-critic check before executing.

decisions:
  - id: RD-DD-001
    kind: decision
    claim: "Navigation model: always-expanded 2-level categorized sidebar."
    decision_area: information_architecture
    depends_on: [RD-H-001, RD-R-003, RD-R-010, RD-R-011, RD-R-012]
    reversibility: costly
    artifact_target: RD-AR-001
    rejects:
      - hypothesis: RD-H-002
        reason: "Breaks RD-R-003's 'scan all chapters in order' requirement."
      - hypothesis: RD-H-003
        reason: "Needless complexity once everything is already visible by default."
    status: active

  - id: RD-DD-002
    kind: decision
    claim: >
      Orientation affordance: same categorized sidebar rendered on every page at every
      breakpoint (RD-H-005), plus a breadcrumb whose category segment is the sole "back to
      category" link (RD-H-006). Revised after critique (RD-CR-001) to add: language.html and
      cli.html additionally get a small fixed bottom-right "back to top" anchor link, because
      those two pages are long single pages (per RD-DD-003) and lose the sidebar's sticky rail
      below the site's existing 1180px breakpoint, leaving no return path there otherwise. The
      12 existing chapter pages do not get this control (short enough today).
    decision_area: interaction
    depends_on: [RD-H-005, RD-H-006, RD-R-014, RD-R-015]
    reversibility: reversible
    artifact_target: RD-AR-001
    rejects:
      - hypothesis: RD-H-004
        reason: "A separate sticky button would stack with the already-sticky topbar."
    revised_by: [RD-REV-001]
    status: active

  - id: RD-DD-003
    kind: decision
    claim: >
      Reference-page template: native <details>/<summary> disclosure tree (RD-H-007), NOT a
      JS widget — chosen specifically because native elements keep content in the DOM/a11y
      tree for non-JS/AI-agent HTML fetchers, which was RD-H-007's own flagged risk and
      RD-H-008's (long-scroll+deep-TOC) whole rationale. cli.html stays ONE page (2 levels of
      nesting), language.html is 1 level. One "Expand all/Collapse all" progressive-enhancement
      control added.
    decision_area: component
    depends_on: [RD-H-007, RD-C-003, RD-R-002, RD-R-018]
    reversibility: costly
    artifact_target: RD-AR-001
    rejects:
      - hypothesis: RD-H-009
        reason: "Lowest confidence; adds N-times generation/ja-twin/provenance-badge complexity for one generated artifact."
    supersedes: [RD-H-008]
    status: active

  - id: RD-DD-004
    kind: decision
    claim: >
      Provenance signal: a neutral, non-warning-colored badge (visible half of RD-H-010/
      RD-H-012). CI-enforced staleness detection (the other half of RD-H-012) is explicitly
      deferred/recommended to the separate generation-pipeline task (project task #3), not
      decided in this session.
    decision_area: component
    depends_on: [RD-H-010, RD-H-012, RD-R-009]
    reversibility: reversible
    artifact_target: RD-AR-001
    deferred:
      - item: "CI-enforced staleness detection for generated reference pages"
        to: "separate generation-pipeline task (project task #3)"
    status: active

  - id: RD-DD-005
    kind: decision
    claim: >
      Visual system: extend the existing token system (RD-H-013), plus exactly one new scoped
      semantic token pair --ref/--ref-soft (synthesis folding in RD-H-014's narrower proposal)
      applied ONLY to generated-reference-page chrome (badge + tree-summary accent), not
      sitewide. Revised after critique (RD-CR-003, RD-CR-007): dropped a bordered header-band
      around badge+H1 and a mono-heading H1/H2 treatment — both collided with this site's
      existing visual grammar (pill+tinted-box already means "verify verdict" elsewhere;
      --mono already exclusively means "literal code" sitewide). Replaced with: a plain badge
      (no wrapping band) + a small mono-set KICKER label above an ordinary sans-serif H1.
    decision_area: token
    depends_on: [RD-H-013, RD-H-014, RD-R-009]
    reversibility: reversible
    artifact_target: RD-AR-001
    revised_by: [RD-REV-003, RD-REV-006]
    status: active

  - id: RD-DD-006
    kind: decision
    claim: >
      Data model: CHAPTERS array gains a categoryId field per entry (+2 new entries: language,
      cli) as single source of truth for chapter->category membership (RD-H-015); a new,
      small, non-growing CATEGORIES array (4 fixed entries: id/order/en/ja label+description)
      added alongside it for category-level metadata that hub pages render from (synthesis
      with RD-H-016, resolved as NOT a competing nav-mapping source since it only holds 4
      fixed records, never per-chapter data). Revised after critique (RD-CR-005): explicitly
      scoped down the doc's original "one-line edit" claim — moving a chapter's categoryId is
      one line, but re-ordering it within its new category's rendered list is NOT (no
      per-category order field exists; render order = CHAPTERS array order filtered by
      categoryId), flagged as a known gap to revisit only if/when a reassignment actually
      happens.
      Chapter->category mapping table (confidence MEDIUM-LOW, see RD-A-004 — the single most
      important open item to route back to the maintainer before task #5 content work treats
      it as settled):
        get-started = {concept, when-to-use}
        guides = {guide, business-layer, requirements-layer, design-layer}
        reference = {syntax, analysis, language[new], cli[new]}
        examples-background = {mechanism, domain, db, ai}
    decision_area: information_architecture
    depends_on: [RD-H-015, RD-H-016, RD-C-005, RD-A-004]
    reversibility: costly
    artifact_target: RD-AR-001
    revised_by: [RD-REV-004]
    status: questioned

  - id: RD-DD-007
    kind: decision
    claim: >
      syntax.{ja,en}.html hero section: add one <div class="callout"> immediately after the
      existing "goal" paragraph in both language variants, pointing readers to the new generated
      language.{ja,en}.html page for exhaustive/canonical grammar lookup. Reuses the existing
      .callout component verbatim — no new visual pattern introduced.
    decision_area: content
    depends_on: [RD-O-003]
    reversibility: reversible
    artifact_target: RD-AR-003
    note: >
      Literal, direct execution of the external fable decision recorded at RD-O-003 (policy
      question 1, canonical-language problem) and of DESIGN-docs-site.md §6's deferral of
      chapter-page rewrites to downstream implementation. No hypothesis generated — copy/content
      addition only, per explicit instruction from the requester that this is execution, not new
      design work.
    status: active

  - id: RD-DD-008
    kind: decision
    claim: >
      analysis.{ja,en}.html: add a visible link to
      https://github.com/ymm-oss/fsl/blob/main/docs/GUIDE-analyze.ja.md, placed near the top
      intro alongside the page's existing link to DESIGN-analysis.md. The English variant
      carries the same link plus a one-line note that the guide is currently Japanese-only
      (no English translation exists).
    decision_area: content
    depends_on: [RD-O-003]
    reversibility: reversible
    artifact_target: RD-AR-003
    note: >
      Literal, direct execution of the external fable decision recorded at RD-O-003 (policy
      question 5). Link text/placement is the only actual copy decision made here; content of
      GUIDE-analyze.ja.md itself is untouched and stays a standalone Markdown deep-dive per that
      external decision.
    status: active

